name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git zip unzip wget openjdk-17-jdk build-essential
        pip install --upgrade pip
        pip install cython buildozer

    # =========================
    # WIPE BUILD CACHE (QUAN TRỌNG)
    # =========================
    - name: Nuke buildozer SDK
      run: |
        rm -rf ~/.buildozer
        rm -rf ~/.android

    # =========================
    # SETUP ANDROID SDK
    # =========================
    - name: Setup Android SDK
      run: |
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        echo "ANDROIDSDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

        mkdir -p $ANDROID_SDK_ROOT
        cd $HOME

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip

        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        unzip -q cmdline.zip -d $ANDROID_SDK_ROOT/cmdline-tools

        mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest

        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --licenses || true

        sdkmanager "platform-tools"
        sdkmanager "platforms;android-31"
        sdkmanager "build-tools;34.0.0"

    # =========================
    # BUILD APK (FORCE ENV)
    # =========================
    - name: Build APK
      run: |
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        export ANDROIDSDK=$HOME/android-sdk
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

        buildozer android debug

    # =========================
    # UPLOAD APK
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk